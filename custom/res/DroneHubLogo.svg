<?xml version="1.0" encoding="UTF-8"?>
<!--
  DroneHub GCS brand mark.
  ფერები ემთხვევა Theme.qml-ს: brandPrimary #0A84FF, brandAccent #30D158.
  მონოქრომულ-ახლო პალიტრა — იკითხება როგორც light, ისე dark toolbar-ზე.
  გამოიყენება: QGCCorePlugin::brandImageIndoor/Outdoor.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="220" height="48" viewBox="0 0 220 48" fill="none" role="img" aria-label="DroneHub GCS">
  <title>DroneHub GCS</title>

  <!-- ===== mark: hexagonal "hub" + სტილიზებული კვადროკოპტერი ===== -->
  <g transform="translate(4 4)">
    <!-- hub hexagon -->
    <path d="M20 1.5 L35.6 10.5 V28.5 L20 37.5 L4.4 28.5 V10.5 Z"
          fill="none" stroke="#0A84FF" stroke-width="2.4" stroke-linejoin="round"/>

    <!-- central body -->
    <circle cx="20" cy="19.5" r="3.6" fill="#0A84FF"/>

    <!-- 4 rotor arms + rotors (quad) -->
    <g stroke="#0A84FF" stroke-width="2.2" stroke-linecap="round">
      <line x1="20" y1="19.5" x2="11" y2="11"/>
      <line x1="20" y1="19.5" x2="29" y2="11"/>
      <line x1="20" y1="19.5" x2="11" y2="28"/>
      <line x1="20" y1="19.5" x2="29" y2="28"/>
    </g>
    <g fill="#0B0E14" stroke="#0A84FF" stroke-width="1.8">
      <circle cx="11" cy="11" r="3"/>
      <circle cx="29" cy="11" r="3"/>
      <circle cx="11" cy="28" r="3"/>
      <circle cx="29" cy="28" r="3"/>
    </g>

    <!-- armed/link status dot (accent green) -->
    <circle cx="33.5" cy="6.5" r="3" fill="#30D158"/>
  </g>

  <!-- ===== wordmark ===== -->
  <g font-family="'Noto Sans Georgian','Helvetica Neue',Arial,sans-serif">
    <text x="52" y="26" font-size="20" font-weight="700" letter-spacing="0.2"
          fill="#0A84FF">Drone<tspan fill="#5A6473">Hub</tspan></text>
    <text x="52" y="40" font-size="9" font-weight="600" letter-spacing="3"
          fill="#5A6473">GROUND CONTROL</text>
  </g>
</svg>
