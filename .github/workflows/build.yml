# DroneHub GCS — custom build CI (F5 foundation).
#
# რას აკეთებს: კლონავს QGC-ს (Stable_V5.0), ჩასვამს ჩვენს custom/ + translations/-ს,
# და აეწყობს custom build-ს. ეს არის რეალური compile-verification ჩვენი custom plugin-ისა.
#
# მოდელირებულია upstream-ის `custom.yml`-ზე (qgroundcontrol/.github/workflows/custom.yml).
# ⚠️ პირველ run-ზე დასავალიდირებელია (Qt ვერსია / system deps / kit).
#
# Qt 6.8.3 LTS — canonical pin (upstream Stable_V5.0 + DroneHub CI).
# Upgrade only when upstream validates a newer LTS/stable Qt and CI/QA pass.

name: DroneHub Build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to build'
        required: false
        default: 'master'
      include_macos:
        description: 'Also build on macOS (10× cost — leave off unless needed)'
        type: boolean
        required: false
        default: false
      sign:
        description: 'Code-sign artifacts (needs signing secrets; use to test the signing pipeline)'
        type: boolean
        required: false
        default: false
  # Reusable: release.yml calls this with include_macos+sign=true and secrets: inherit.
  workflow_call:
    inputs:
      ref:
        description: 'Branch or tag to build'
        required: false
        type: string
        default: 'master'
      include_macos:
        description: 'Also build on macOS'
        required: false
        type: boolean
        default: false
      sign:
        description: 'Code-sign / notarize artifacts (needs signing secrets)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# Manual-only workflow — concurrent runs on the same ref cancel in progress (CI minutes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  QGC_TAG: Stable_V5.0
  QT_VERSION: 6.8.3

jobs:
  desktop:
    name: ${{ matrix.config.os }} (custom)
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      # macOS runners cost 10× Actions minutes, so they are opt-in via the
      # include_macos input. Default builds Linux (1×) + Windows (2×) only.
      matrix:
        config: >-
          ${{ fromJSON(inputs.include_macos
          && '[{"os":"ubuntu-latest","qt_host":"linux","qt_arch":"linux_gcc_64"},{"os":"windows-latest","qt_host":"windows","qt_arch":"win64_msvc2022_64"},{"os":"macos-latest","qt_host":"mac","qt_arch":"clang_64"}]'
          || '[{"os":"ubuntu-latest","qt_host":"linux","qt_arch":"linux_gcc_64"},{"os":"windows-latest","qt_host":"windows","qt_arch":"win64_msvc2022_64"}]') }}

    steps:
      - name: Checkout DroneHub
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'master' }}

      - name: Clone QGroundControl (${{ env.QGC_TAG }}) + wire custom/
        shell: bash
        run: |
          git clone --recursive --branch "$QGC_TAG" --depth 1 \
            https://github.com/mavlink/qgroundcontrol.git qgroundcontrol
          # ჩვენი custom/ + ka თარგმანი QGC tree-ში (symlink-ის ნაცვლად — CI-ში copy უსაფრთხოა)
          rm -rf qgroundcontrol/custom
          cp -R custom qgroundcontrol/custom
          cp translations/qgc_ka.ts qgroundcontrol/translations/qgc_ka.ts
          if [ ! -f qgroundcontrol/custom/res/fonts/NotoSansGeorgian.ttf ]; then
            echo "::group::Fetch Georgian font (OFL)"
            curl -fsSL "https://raw.githubusercontent.com/google/fonts/main/ofl/notosansgeorgian/NotoSansGeorgian%5Bwdth%2Cwght%5D.ttf" \
              -o qgroundcontrol/custom/res/fonts/NotoSansGeorgian.ttf
            echo "::endgroup::"
          fi

      - name: Install platform build deps
        shell: bash
        # Use $RUNNER_OS env var (always set by GitHub Actions) rather than
        # expression-based `if: runner.os == '...'` conditions which have been
        # observed to be silently skipped on some hosted runner images.
        # Stable_V5.0 cmake/Install.cmake requires create-dmg on macOS at
        # configure time, so it must be present before the cmake step runs.
        run: |
          case "$RUNNER_OS" in
            Linux)
              sudo apt-get update
              sudo apt-get install -y ninja-build libgl1-mesa-dev libxkbcommon-dev \
                libvulkan-dev libxcb-cursor0 libpulse-dev
              ;;
            macOS)
              brew install create-dmg
              echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"
              ;;
          esac

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: ${{ matrix.config.qt_host }}
          target: desktop
          arch: ${{ matrix.config.qt_arch }}
          modules: qtcharts qtlocation qtpositioning qtspeech qt5compat qtmultimedia qtserialport qtimageformats qtshadertools qtconnectivity qtquick3d qtsensors
          cache: true

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure (custom build)
        working-directory: qgroundcontrol
        shell: bash
        # GStreamer გათიშულია — CI ამოწმებს custom plugin/branding/QML-ს,
        # არა video backend-ს (თავიდან ვიცილებთ GStreamer deps-ს 3 platform-ზე).
        # production build-ში: -DQGC_ENABLE_GST_VIDEOSTREAMING=ON + GStreamer deps.
        # install-qt-action exports QT_ROOT_DIR on every runner, so plain cmake
        # can find Qt without relying on a platform-specific qt-cmake wrapper.
        run: |
          CMAKE_EXTRA_ARGS=()
          if [ "$RUNNER_OS" = "macOS" ]; then
            command -v create-dmg || { echo "::error::create-dmg not found after brew install — check the 'Install platform build deps' step"; exit 1; }
            CMAKE_EXTRA_ARGS+=("-DCREATE_DMG_PROGRAM=$(brew --prefix)/bin/create-dmg")
            # ახალ macOS SDK-ებიდან 'AGL' framework ამოღებულია, QtQuick3D (Viewer3D) კი
            # მას ლინკავს → link fail. Viewer3D-ს macOS CI-ზე ვთიშავთ (Linux/Win-ზე ON რჩება).
            CMAKE_EXTRA_ARGS+=("-DQGC_VIEWER3D=OFF")
          fi
          cmake -S . -B build -G Ninja \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DQGC_CUSTOM_BUILD=ON \
            -DQGC_ENABLE_GST_VIDEOSTREAMING=OFF \
            "${CMAKE_EXTRA_ARGS[@]}"

      - name: Build
        working-directory: qgroundcontrol
        shell: bash
        run: cmake --build build --config Release

      # CPack `package` target is registered by QGC's include(CPack); it produces the
      # platform installer (macOS .dmg / Windows NSIS .exe / Linux .AppImage) as QGC
      # configures it. Best-effort: never fail the build — the broad upload glob below
      # still ships whatever was produced (installer or raw build output).
      # ⚠️ First release run should be validated (deploy tooling availability per host).
      - name: Package installer
        working-directory: qgroundcontrol
        shell: bash
        run: |
          cmake --build build --config Release --target package \
            || echo "::warning::package target failed on $RUNNER_OS — uploading raw build output instead"
          echo "Artifacts produced:"
          find build -maxdepth 2 \( -name '*.dmg' -o -name '*.exe' -o -name '*.AppImage' \
            -o -name '*.zip' -o -name '*.tar.gz' -o -name '*.deb' \) -print 2>/dev/null || true

      # --- Signing / notarization (opt-in via the `sign` input AND signing secrets) ---
      # Steps no-op when sign=false or the relevant secret is absent, so the workflow
      # stays green before certificates are provisioned. See docs/RELEASE.md.
      - name: Sign & notarize (macOS)
        if: inputs.sign && runner.os == 'macOS' && env.MACOS_CERT_P12 != ''
        working-directory: qgroundcontrol
        shell: bash
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/dronehub-signing.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PWD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          APP="$(find build -maxdepth 3 -name '*.app' -type d | head -n1)"
          [ -n "$APP" ] && codesign --force --deep --options runtime --timestamp \
            --sign "$MACOS_SIGN_IDENTITY" "$APP"
          DMG="$(find build -maxdepth 2 -name '*.dmg' | head -n1)"
          if [ -n "$DMG" ]; then
            codesign --force --timestamp --sign "$MACOS_SIGN_IDENTITY" "$DMG"
            xcrun notarytool submit "$DMG" --apple-id "$MACOS_NOTARY_APPLE_ID" \
              --team-id "$MACOS_NOTARY_TEAM_ID" --password "$MACOS_NOTARY_PASSWORD" --wait
            xcrun stapler staple "$DMG"
          fi
          security delete-keychain "$KEYCHAIN"

      - name: Sign (Windows)
        if: inputs.sign && runner.os == 'Windows' && env.WINDOWS_CERT_PFX != ''
        working-directory: qgroundcontrol
        shell: pwsh
        env:
          WINDOWS_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $pfx = "$env:RUNNER_TEMP\dronehub.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERT_PFX))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          Get-ChildItem -Recurse build -Include *.exe |
            ForEach-Object {
              & $signtool.FullName sign /f $pfx /p $env:WINDOWS_CERT_PASSWORD `
                /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $_.FullName
            }
          Remove-Item $pfx -Force

      - name: Upload desktop artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: DroneHubGCS-${{ matrix.config.os }}
          path: |
            qgroundcontrol/build/*.dmg
            qgroundcontrol/build/*.exe
            qgroundcontrol/build/*.AppImage
            qgroundcontrol/build/*.zip
            qgroundcontrol/build/*.tar.gz
            qgroundcontrol/build/*.deb
          if-no-files-found: warn

  # Android · Web(WASM) — ცალკე kit-ები; ჩონჩხი F5-ის გასაგრძელებლად.
  # android: NDK toolchain (-DCMAKE_TOOLCHAIN_FILE=<ndk>) · web: qt-cmake WASM kit.
  # იხ. upstream: qgroundcontrol/.github/workflows/{android-*,*wasm*}.yml
